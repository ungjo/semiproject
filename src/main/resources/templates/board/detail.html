<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
   <meta charset="UTF-8">
   <!-- 탭 제목도 동적으로 표시 -->
   <title th:text="${board.boardTitle}">게시글 상세보기</title>
   <link rel="stylesheet" th:href="@{/css/common.css}">
   <link rel="stylesheet" th:href="@{/css/board-detail.css}">
</head>

<body>

   <!-- fragments 사용 -layout.html의 nav를 이 자리에 삽입 -->
   <nav th:replace="~{fragments/layout :: nav}"></nav>

   <div class="container">

      <!-- ===== 게시글 본문 ===== -->
      <div class="board-detail">
         <h2 th:text="${board.boardTitle}">제목</h2>

         <div class="board-meta">
            <span>작성자: <strong th:text="${board.memberLoginId}">아이디</strong></span>
            <span>날짜: <span th:text="${board.boardDate}">날짜</span></span>
            <span>조회수: <span th:text="${board.boardHit}">0</span></span>
         </div>

         <div class="board-content" th:text="${board.boardContent}">내용</div>

         <!-- 수정·삭제 버튼 — 작성자 본인(hong)이 로그인한 경우에만 표시 -->
         <div class="board-actions" th:if="${session.loginMember != null and session.loginMember.memberId == board.memberId}">
            <a th:href="@{/board/update/{id}(id=${board.boardId})}" class="btn btn-secondary">수정</a>
			<!-- 삭제할 게시판 ID를 POST 방식으로 전달하여 DB에서 해당 게시글 삭제 -->
			<form th:action="@{/board/delete/{id}(id=${board.boardId})}"
			               method="post" style="display:inline"
			               onsubmit="return (confirm('정말 삭제하시겠습니까?'))">
			               <button class="btn btn-danger" type="submit">삭제</button>
			            </form>
         </div>

         <a th:href="@{/board/list}" class="btn">목록으로</a>
      </div>

      <!-- ===== 댓글 영역 ===== -->
      <div class="comment-section">
         <h3>댓글 <span id="commentCount" th:text="${#lists.size(commentList)}">0</span>개</h3>

         <div id="commentList">
            <!-- th:each : commentList의 각 댓글을 반복 출력 -->
            <div class="comment-item" th:each="comment : ${commentList}" th:id="'comment-'+${comment.commentId}">
               <span class="comment-author" th:text="${comment.memberLoginId}">작성자</span>
               <span class="comment-content" th:text="${comment.commentContent}">내용</span>
               <span class="comment-date" th:text="${comment.commentDate}">날짜</span>
               <button class="btn btn-sm btn-danger"
                  th:if="${loginMemberId != null and loginMemberId == comment.memberId}" th:onclick="'deleteComment(' + ${comment.commentId} + ')'">삭제</button>
            </div>
         </div>

         <!-- 댓글 작성 폼 — 로그인 상태에서만 표시 -->
		 <div th:if="${loginMemberId != null}">
	         <form class="comment-form" if="commentForm" onsubmit="return false">
				<!-- hidden : Thymeleaf가 서버 데이터를 HTML에 삽입 -> js에서 읽기 가능 -->
				<input type="hidden" id="boardId" th:value="${board.boardId}">
				<input type="hidden" id="loginMemberId" th:value="${loginMemberId}">
				<input type="hidden" id="loginMemberLoginId" th:value="${loginMemberLoginId}">
	            <textarea id="commentContent" rows="3" placeholder="댓글을 입력하세요 (최대 500자)" maxlength="500"></textarea>
	            <button class="btn btn-primary" type="button" onclick="submitComment()">댓글 등록</button>
	         </form>
		 </div>

         <!-- 비로그인 상태일 때 표시 (위 comment-form 대신) -->
         
           <div th:unless="${session.loginMember != null}" class="login-required">
               <a th:href="@{/member/login}">로그인</a> 후 댓글을 작성할 수 있습니다.
           </div>
        
      </div>

   </div>
</body>
<script th:src="@{/js/comment.js}"></script>
</html>
