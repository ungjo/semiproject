<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/board-write.css}">
</head>
<body>

	<!-- fragments 사용 -layout.html의 nav를 이 자리에 삽입 -->
	<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="container">
    <h2>게시글 작성</h2>

    <!--
        action="/board/write" — POST /board/write 로 폼 전송
        method="post" — 제목·내용을 URL에 노출하지 않기 위해 POST 사용
    -->
    <form class="write-form" th:action="@{/board/write}" method="post">

        <div class="form-group">
            <label for="boardTitle">제목</label>
            <!--
                name="boardTitle" — BoardDTO.boardTitle 필드에 자동 매핑
                required — 비어 있으면 브라우저가 제출을 막음
            -->
            <input type="text"
                   id="boardTitle"
                   name="boardTitle"
                   placeholder="제목을 입력하세요"
                   required>
        </div>

        <div class="form-group">
            <label for="boardContent">내용</label>
            <!--
                name="boardContent" — BoardDTO.boardContent 필드에 자동 매핑
            -->
            <textarea id="boardContent"
                      name="boardContent"
                      rows="14"
                      placeholder="내용을 입력하세요"
                      required></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">등록</button>
            <a th:href="@{/board/list}" class="btn btn-secondary">취소</a>
        </div>

    </form>
</div>
</body>
</html>
