<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<nav class="nav-bar">
    <a class="nav-title" href="01_list.html">📋 세미 프로젝트 게시판</a>
    <div class="nav-links">
        <a href="05_login.html">로그인</a>
        <a href="06_join.html">회원가입</a>
    </div>
</nav>

<div class="container-sm">
    <h2>로그인</h2>

    <!-- 로그인 실패 시 오류 메시지 표시 (Thymeleaf: th:if="${param.error == 'fail'}") -->
    <div class="error-msg">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <!--
        action="/member/login" — POST /member/login 으로 폼 전송
        method="post" — 비밀번호가 URL에 노출되지 않도록 반드시 POST 사용
    -->
    <form action="#" method="post">

        <div class="form-group">
            <label for="loginId">아이디</label>
            <!--
                name="loginId" — MemberController @RequestParam("loginId") 와 일치해야 함
            -->
            <input type="text"
                   id="loginId"
                   name="loginId"
                   placeholder="아이디를 입력하세요"
                   required>
        </div>

        <div class="form-group">
            <label for="pwd">비밀번호</label>
            <!--
                name="pwd" — MemberController @RequestParam("pwd") 와 일치해야 함
                type="password" — 입력 내용이 ●●●로 마스킹됨
            -->
            <input type="password"
                   id="pwd"
                   name="pwd"
                   placeholder="비밀번호를 입력하세요"
                   required>
        </div>

        <div class="form-footer">
            <a href="06_join.html" class="btn btn-secondary">회원가입</a>
            <button type="submit" class="btn btn-primary">로그인</button>
        </div>

    </form>
</div>
</body>
</html>
